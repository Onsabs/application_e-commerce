<body>

    <section class="hero" id="home">
        <div class="hero-bg"></div>
        <div class="hero-container">
            <div class="hero-left">

                <h2 class="hero-title">
                    <span class="line"><span>New Fashion</span></span>
                    <span class="line"><span>Collection <span class="accent">2026</span></span></span>
                </h2>

                <div class="cta-group">
                    <a routerLink="/products" class="cta-button primary">Explore Collection</a>

                </div>

            </div>
            <div class="hero-right">
                <div class="hero-image-wrapper">
                    <div class="hero-carousel">
                        <div class="carousel-slide ">
                            <img src="assets/images/gallery-02.jpg" alt="Fashion Model 1">
                        </div>
                        <div class="carousel-slide">
                            <img src="assets/images/blog-02.jpg" alt="Fashion Model 2">
                        </div>
                        <div class="carousel-slide">
                            <img src="assets/images/blog-03.jpg" alt="Fashion Model 3">
                        </div>

                        <div class="carousel-overlay"></div>
                        <div class="carousel-indicators">
                            <span class="indicator active" data-slide="0"></span>
                            <span class="indicator" data-slide="1"></span>
                            <span class="indicator" data-slide="2"></span>
                        </div>
                    </div>
                    <div class="floating-tags">
                        <div class="tag">Limited Edition</div>
                        <div class="tag">Handcrafted</div>
                        <div class="tag">Premium Quality</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="scroll-indicator">
            <span></span>
        </div>
    </section>


</body>
